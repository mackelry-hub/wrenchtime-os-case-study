<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Sample WrenchTime OS dashboard mockup with fake data</title>
  <desc id="desc">A sanitized dashboard mockup showing generic operational cards and fake aggregate metrics.</desc>
  <rect width="1200" height="760" fill="#f7f8fb"/>

  <rect x="0" y="0" width="1200" height="72" fill="#111827"/>
