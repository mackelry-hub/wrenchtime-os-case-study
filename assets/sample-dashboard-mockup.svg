  <text x="40" y="122" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700" fill="#111827">Operations Dashboard</text>
  <text x="40" y="150" font-family="Inter, Arial, sans-serif" font-size="15" fill="#6b7280">Fake data only - public case study artifact</text>

  <g transform="translate(40 190)">
