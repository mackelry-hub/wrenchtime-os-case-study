    <text x="52" y="151" font-family="Inter, Arial, sans-serif" font-size="14" fill="#374151">Confirm upcoming schedule capacity.</text>
  </g>

  <g transform="translate(40 550)">
    <rect width="1075" height="130" rx="8" fill="#ffffff" stroke="#d9dee8"/>
    <text x="24" y="42" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700" fill="#111827">Pipeline Snapshot</text>
    <rect x="24" y="66" width="180" height="34" rx="6" fill="#dbeafe"/>
    <text x="46" y="88" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#1e3a8a">New Quote</text>
