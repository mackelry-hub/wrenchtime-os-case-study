    <text x="458" y="88" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#92400e">Deposit Paid</text>
    <rect x="642" y="66" width="180" height="34" rx="6" fill="#ede9fe"/>
    <text x="664" y="88" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#5b21b6">Work Complete</text>
