    <text x="22" y="78" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800" fill="#111827">12</text>
    <text x="22" y="106" font-family="Inter, Arial, sans-serif" font-size="14" fill="#6b7280">4 awaiting review</text>
  </g>

  <g transform="translate(315 190)">
